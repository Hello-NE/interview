version: "1"
packages:
  - name: "db"
    path: "db/sqlc"
    queries:
      - "db/query/account.sql"
      - "db/query/entry.sql"
      - "db/query/transfer.sql"
      - "db/query/user.sql"
    schema:
      - "db/migration/000001_init_schema.up.sql"
      - "db/migration/000002_add_users.up.sql"
    engine: "postgresql"
    emit_json_tags: true
    emit_prepared_queries: false
    emit_interface: false
    emit_exact_table_names: false
    emit_empty_slices: true
